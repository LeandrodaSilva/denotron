name: Checks

on: [push, pull_request]

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install stable deno
        uses: denoland/setup-deno@v2

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            cmake ninja-build clang xvfb

      - name: Run check
        run: deno check mod.ts

      - name: Run fmt
        run: deno fmt --check

      - name: Run lint
        run: deno lint

      - name: Run unit tests
        run: deno task test

      - name: Build native library
        env:
          WEBVIEW_WEBKITGTK_API: "4.1"
        run: deno task build

      - name: Run doc tests
        run: deno task test:doc

      - name: Run e2e tests
        run: xvfb-run -a deno task test:e2e
